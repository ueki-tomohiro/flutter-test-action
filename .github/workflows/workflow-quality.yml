name: Workflow Quality

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Install workflow linters
        run: sudo apt-get update && sudo apt-get install -y shellcheck python3-pyflakes

      - name: Install actionlint
        run: |
          export GOBIN="$RUNNER_TEMP/bin"
          mkdir -p "$GOBIN"
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Run actionlint
        run: |
          "$RUNNER_TEMP/bin/actionlint" -color

  zizmor:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Audit workflows with zizmor
        continue-on-error: true
        uses: zizmorcore/zizmor-action@44e52c2f5f6cb81d53a9d518d9bc759aeb86c0e5
        with:
          advanced-security: true
