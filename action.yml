name: 'Flutter Test Report'
description: 'create Flutter test report'
author: 'Tomohiro Ueki'
inputs:
  coveragePath:
    required: false
    description: 'coverage/lcov.info'
  machinePath:
    required: false
    description: 'input flutter test --machine result path'
  title:
    required: false
    description: 'Title for the check results'
    default: 'Flutter test results'
  coverageThreshold:
    required: false
    description: 'Minimum coverage percentage required for success'
    default: '80'
  token:
    required: false
    description: 'The GitHub authentication token'
    default: ${{ github.token }}
outputs:
  conclusion:
    description: 'Combined conclusion for tests and coverage'
  tests:
    description: 'Total number of parsed tests'
  passed:
    description: 'Number of successful tests'
  failed:
    description: 'Number of failed tests'
  coverage:
    description: 'Overall coverage percentage'
  coverage-hit:
    description: 'Covered lines'
  coverage-found:
    description: 'Total lines considered for coverage'
runs:
  using: 'node24'
  main: 'dist/index.js'
